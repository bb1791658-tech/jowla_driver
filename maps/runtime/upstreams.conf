limit_req_zone $binary_remote_addr zone=jowla_geocoding:10m rate=5r/s;
map $http_x_forwarded_proto $jowla_public_scheme {
  default $http_x_forwarded_proto;
  "" $scheme;
}

server {
  listen 8080;
  client_max_body_size 4m;

  location / {
    proxy_pass http://tiles_blue:8080;
    proxy_http_version 1.1;
    proxy_set_header Accept-Encoding "";
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    sub_filter_types application/json;
    sub_filter 'http://localhost:8080' '$jowla_public_scheme://$http_host';
    sub_filter_once off;
  }
}

server {
  listen 7070;

  location / {
    limit_req zone=jowla_geocoding burst=10 nodelay;
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $geocoding_origin http://geocoding:8080;
    proxy_pass $geocoding_origin;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}

server {
  listen 5001;

  location / {
    proxy_pass http://routing_blue:5000;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
