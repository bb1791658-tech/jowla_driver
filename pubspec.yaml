name: jowla_driver
description: تطبيق السائق لمنظومة جولة
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  connectivity_plus: ^7.3.0
  dio: ^5.10.0
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^10.3.1
  geolocator: ^14.0.2
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  intl: ^0.20.2
  latlong2: ^0.10.1
  maplibre: ^0.3.5
  # Keep the Android plugin on the legacy-KGP-compatible release until
  # flutter_webrtc and maplibre_android both complete Flutter's AGP 9
  # built-in Kotlin migration. Upgrade these three dependencies together.
  package_info_plus: 9.0.1
  socket_io_client: ^3.1.6
  url_launcher: ^6.3.1
  firebase_core: ^4.12.1
  firebase_messaging: ^16.4.3
  flutter_webrtc: ^1.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  config:
    # MapLibre uses SwiftPM while flutter_webrtc currently falls back to
    # CocoaPods. Flutter supports this hybrid installer setup.
    enable-swift-package-manager: true
  assets:
    - assets/map_markers/driver-car-top.png
    - config/development.json
